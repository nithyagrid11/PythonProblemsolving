<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Movie Discovery</title>
</head>
<body>
    <nav>
        <div>
            <h1 class="header">MvD</h1>
        </div>
    </nav>
    <section class="carousel-container">
        <div class="carousel-content">
            <h2>Recent</h2>
            <p>Discover the latest blockbuster</p>
        </div>

        <div class="carousel-slider">
            <div class="movie-card-mini">
                <img src="images/gifted.jpg" alt="Gifted Movie">
                <div class="card-info">
                    <span class="rating">⭐ 4.5</span>
                    <h4>Gifted</h4>
                </div>
            </div>

            <div class="movie-card-mini">
                <img src="images/bahubali.jpg" alt="Bahubali Movie">
                <div class="card-info">
                    <span class="rating">⭐ 4.5</span>
                    <h4>Bahubali</h4>
                </div>
            </div>

            <div class="movie-card-mini">
                <img src="images/project hail mary.jpg" alt="Project Hail Mary Movie">
                <div class="card-info">
                    <span class="rating">⭐ 5</span>
                    <h4>Project Hail Mary</h4>
                </div>
            </div>

            <div class="movie-card-mini">
                <img src="images/dhurandhar.jpg" alt="Dhurandhar Movie">
                <div class="card-info">
                    <span class="rating">⭐ 4.8</span>
                    <h4>Dhurandhar</h4>
                </div>
            </div>

            <div class="movie-card-mini">
                <img src="images/harry potter.jpg" alt="Harry Potter Movie">
                <div class="card-info">
                    <span class="rating">⭐ 5</span>
                    <h4>Harry Potter</h4>
                </div>
            </div>

            <div class="movie-card-mini">
                <img src="images/frozen.jpg" alt="Frozen Movie">
                <div class="card-info">
                    <span class="rating">⭐ 5</span>
                    <h4>Frozen</h4>
                </div>
            </div>

            <div class="movie-card-mini">
                <img src="images/banglore days.jpg" alt="Banglore Days Movie">
                <div class="card-info">
                    <span class="rating">⭐ 5</span>
                    <h4>Banglore Days</h4>
                </div>
            </div>

            <div class="movie-card-mini">
                <img src="images/sinners.jpg" alt="Sinners Movie">
                <div class="card-info">
                    <span class="rating">⭐ 4.5</span>
                    <h4>Sinners</h4>
                </div>
            </div>

            <div class="movie-card-mini">
                <img src="images/the drama.jpg" alt="The Drama Movie">
                <div class="card-info">
                    <span class="rating">⭐ 4.5</span>
                    <h4>The Drama</h4>
                </div>
            </div>

            <div class="movie-card-mini">
                <img src="images/ready or not 2.jpg" alt="Ready or Not 2 Movie">
                <div class="card-info">
                    <span class="rating">⭐ 4</span>
                    <h4>Ready or Not 2</h4>
                </div>
            </div>

            <div class="movie-card-mini">
                <img src="images/taylor swift.jpg" alt="Taylor Swift Movie">
                <div class="card-info">
                    <span class="rating">⭐ 4.8</span>
                    <h4>Taylor Swift Musical Documentary</h4>
                </div>
            </div>
        </div>
    </section>

    <div class="search-container">
        <form action="/search" method="get">
            <input type="search" name="search" placeholder="Search movies...">
            <label for="search-dropdown"></label>
            <select id="search-dropdown" name="search-dropdown">
                <option value="Genre">Genre</option>
                <option value="Drama">Drama</option>
                <option value="Comedy">Comedy</option>
                <option value="Thriller">Thriller</option>
                <option value="Romance">Romance</option>
                <option value="Sci-fi">Sci-fi</option>
                <option value="Action">Action</option>
                <option value="Horror">Horror</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Documentary">Documentary</option>
            </select>
            <button><i class="searchclass"></i></button>
        </form>
    </div>

</body>
</html>
