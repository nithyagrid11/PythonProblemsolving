    <div class="search-container">
        <form class="search-form">
            <input type="search" name="search" placeholder="Search movies...">
            <label for="search-dropdown"></label>
            <div class="filters">
                <button type="button" class="filter-btn">Filters ▼</button>

                <div class="filter-menu"><!--dropdown container-->
                    <div class="filter-item" onclick="toggleMenu('genre-menu')">Genre ▼</div>
                    <div class="sub-menu" id="genre-menu">
                        <p>Drama</p>
                        <p>Comedy</p>
                        <p>Thriller</p>
                        <p>Romance</p>
                        <p>Action</p>
                        <p>Documentary</p>
                    </div>
                    <div class="filter-item" onclick="toggleMenu('rating-menu')">Rating ▼</div>
                    <div class="sub-menu" id="rating-menu">
                        <p>5 rating</p>
                        <p>4+ rating</p>
                        <p>3+ rating</p>
                        <p>2+ rating</p>
                        <p>1+ rating</p>
                    </div>
                </div>
            </div>

            <button class="searchbtn" type="submit">
                <img src="images/searchicon.png" alt="Search icon">
            </button>
        </form>
